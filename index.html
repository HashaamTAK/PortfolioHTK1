<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const FM = window.FramerMotion;
const { motion, AnimatePresence, useMotionValue, useSpring, useTransform, useInView } = FM;

const C = {
  bg:"#02020a", s1:"#07071a", s2:"#0d0d24",
  border:"rgba(255,255,255,0.06)", borderB:"rgba(255,255,255,0.12)",
  text:"#e2e2f0", muted:"#6b6b8a", dim:"#2a2a40",
  violet:"#8b5cf6", cyan:"#06b6d4", rose:"#f43f5e",
  amber:"#f59e0b", emerald:"#10b981", pink:"#ec4899",

/* GRAD TEXT */
const GradText = ({ children, from=C.violet, to=C.cyan }) => (
  <span style={{background:`linear-gradient(135deg,${from},${to})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>{children}</span>
);

/* AURORA */
function Aurora() {
  const blobs = [
    {col:"#6d28d9",x:"-5%",y:"-15%",size:900,delay:0},
    {col:"#0e7490",x:"55%",y:"15%",size:700,delay:-7},
    {col:"#9d174d",x:"15%",y:"55%",size:650,delay:-14},
    {col:"#065f46",x:"70%",y:"65%",size:550,delay:-11},
  ];
  return (
    <div style={{position:"fixed",inset:0,zIndex:0,overflow:"hidden",pointerEvents:"none"}}>
      {blobs.map((b,i)=>(
        <motion.div key={i} style={{position:"absolute",width:b.size,height:b.size,borderRadius:"50%",background:b.col,left:b.x,top:b.y,filter:"blur(140px)",opacity:.12}}
          animate={{x:[0,50,-30,0],y:[0,-40,25,0],scale:[1,1.12,.94,1]}}
          transition={{duration:22,repeat:Infinity,ease:"easeInOut",delay:b.delay}}/>
      ))}
      <div style={{position:"absolute",inset:0,
        backgroundImage:"linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px)",
        backgroundSize:"80px 80px",
        maskImage:"radial-gradient(ellipse 90% 60% at 50% 0%,black 20%,transparent 100%)",
        WebkitMaskImage:"radial-gradient(ellipse 90% 60% at 50% 0%,black 20%,transparent 100%)"
      }}/>
    </div>
  );
}

/* CURSOR GLOW */
function CursorGlow() {
  const mx = useMotionValue(0), my = useMotionValue(0);
  const sx = useSpring(mx,{stiffness:70,damping:18}), sy = useSpring(my,{stiffness:70,damping:18});
  useEffect(()=>{
    const h=e=>{mx.set(e.clientX);my.set(e.clientY)};
    window.addEventListener("mousemove",h);
    return ()=>window.removeEventListener("mousemove",h);
  },[]);
  return <>
    <motion.div style={{position:"fixed",top:0,left:0,pointerEvents:"none",zIndex:9999,width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,.07) 0%,transparent 70%)",translateX:useTransform(sx,v=>v-300),translateY:useTransform(sy,v=>v-300)}}/>
    <motion.div style={{position:"fixed",top:0,left:0,pointerEvents:"none",zIndex:10000,width:8,height:8,borderRadius:"50%",background:C.violet,boxShadow:`0 0 14px ${C.violet}`,translateX:useTransform(mx,v=>v-4),translateY:useTransform(my,v=>v-4)}}/>
  </>;
}

/* SHOOTING STARS */
function Star({delay}) {
  return <motion.div style={{position:"absolute",top:`${10+Math.random()*40}%`,left:"-20px",width:2,height:2,borderRadius:"50%",background:"#fff",boxShadow:"0 0 6px rgba(255,255,255,.6)"}}
    initial={{x:-20,y:0,opacity:0}}
    animate={{x:"120vw",y:"35vh",opacity:[0,1,1,0]}}
    transition={{duration:2.8,delay,repeat:Infinity,repeatDelay:Math.random()*10+6,ease:"easeIn"}}/>;
}

/* REVEAL */
function Reveal({children,delay=0,style={}}) {
  const ref = useRef(null);
  const inView = useInView(ref,{once:true,margin:"-50px"});
  return (
    <motion.div ref={ref} initial={{opacity:0,y:28}} animate={inView?{opacity:1,y:0}:{opacity:0,y:28}}
      transition={{duration:.75,ease:[.16,1,.3,1],delay}} style={style}>
      {children}
    </motion.div>
  );
}

/* TILT CARD */
function Card({children,style={},glow=C.violet}) {
  const ref=useRef(null);
  const rx=useMotionValue(0),ry=useMotionValue(0);
  const srx=useSpring(rx,{stiffness:180,damping:22}),sry=useSpring(ry,{stiffness:180,damping:22});
  const handleMove=e=>{
    const r=ref.current.getBoundingClientRect();
    rx.set(((e.clientY-r.top)/r.height-.5)*12);
    ry.set(-((e.clientX-r.left)/r.width-.5)*12);
  };
  return (
    <motion.div ref={ref} onMouseMove={handleMove} onMouseLeave={()=>{rx.set(0);ry.set(0)}}
      style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:16,backdropFilter:"blur(16px)",rotateX:srx,rotateY:sry,transformStyle:"preserve-3d",position:"relative",overflow:"hidden",...style}}
      whileHover={{borderColor:`${glow}44`,boxShadow:`0 24px 80px rgba(0,0,0,.6),0 0 0 1px ${glow}22`}}
      transition={{duration:.3}}>
      <div style={{position:"absolute",inset:0,borderRadius:16,background:"linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 60%)",pointerEvents:"none"}}/>
      {children}
    </motion.div>
  );
}

/* MAGNETIC BUTTON */
function Btn({children,onClick,variant="primary",style={}}) {
  const ref=useRef(null);
  const x=useMotionValue(0),y=useMotionValue(0);
  const sx=useSpring(x,{stiffness:250,damping:18}),sy=useSpring(y,{stiffness:250,damping:18});
  const mv=useCallback(e=>{
    const r=ref.current.getBoundingClientRect();
    x.set((e.clientX-r.left-r.width/2)*.4);
    y.set((e.clientY-r.top-r.height/2)*.4);
  },[]);
  const base={position:"relative",border:"none",cursor:"none",padding:"13px 30px",borderRadius:10,fontWeight:600,fontSize:14,display:"inline-flex",alignItems:"center",gap:8,...style};
  const vs=variant==="primary"
    ?{background:"linear-gradient(135deg,#7c3aed,#0891b2)",color:"#fff",boxShadow:"0 0 40px rgba(124,58,237,.3),inset 0 1px 0 rgba(255,255,255,.12)"}
    :{background:"rgba(255,255,255,.05)",color:C.text,border:"1px solid rgba(255,255,255,.12)"};
  return (
    <motion.button ref={ref} style={{...base,...vs,translateX:sx,translateY:sy}}
      onMouseMove={mv} onMouseLeave={()=>{x.set(0);y.set(0)}} whileTap={{scale:.96}} onClick={onClick}>
      {children}
    </motion.button>
  );
}

/* COUNTER */
function Counter({target,suffix=""}) {
  const [v,setV]=useState(0);
  const ref=useRef(null);
  const inView=useInView(ref,{once:true});
  useEffect(()=>{
    if(!inView)return;
    const dur=1800,t0=performance.now();
    const step=now=>{
      const p=Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,3);
      setV(Math.floor(e*target));
      if(p<1)requestAnimationFrame(step);else setV(target);
    };
    requestAnimationFrame(step);
  },[inView,target]);
  return <span ref={ref}>{v}{suffix}</span>;
}

/* NAV */

/* INTRO */
function Intro({onDone}) {
  const [p,setP]=useState(0);
  useEffect(()=>{
    let v=0;
    const id=setInterval(()=>{
      v+=Math.random()*16+5;
      if(v>=100){v=100;clearInterval(id);setTimeout(onDone,500);}
      setP(Math.floor(v));
    },55);
    return()=>clearInterval(id);
  },[]);
  return (
    <motion.div exit={{opacity:0,scale:.98}} transition={{duration:.65,ease:[.16,1,.3,1]}}
      style={{position:"fixed",inset:0,background:C.bg,zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>

      <div style={{width:200,height:2,background:"rgba(255,255,255,.06)",borderRadius:1,overflow:"hidden",marginBottom:14}}>
